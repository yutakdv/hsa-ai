name: CI

# development → main PR이 열리거나 새 커밋이 push될 때만 실행
# 소스 브랜치가 development가 아니면 즉시 차단
#
# [개선된 배포 순서]
# 기존: merge → build → ECR push → ECS deploy
# 개선: build → ECR push → merge → ECS deploy
#
# merge 이전에 ECR push까지 완료하여 merge 이후 실패 지점을
# ECS deploy 단계 하나로 줄임
# ECS deploy 실패 시 Circuit Breaker가 자동 롤백하므로 서비스는 안전
#
# [브랜치 보호 규칙 설정 필요]
# GitHub → Settings → Branches → main → Require status checks to pass:
#   - Check Source Branch
#   - Lint & Test
#   - Docker Build Check
# 위 3개를 required로 등록해야 CI 실패 시 머지 버튼이 비활성화됨

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# [수정] 워크플로 레벨은 최소 권한(read)으로 제한
# write 권한은 실제로 필요한 deploy.yml의 deploy job에서만 선언
permissions:
  contents: write
  pull-requests: write
  id-token: write

# [추가] 같은 PR에 커밋이 연속으로 push될 때 구 커밋 CI는 취소
# deploy job은 deploy.yml의 concurrency(cancel-in-progress: false)로 별도 직렬화
concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------
  # 0. 소스 브랜치 검증
  #    development → main 이외의 PR은 여기서 차단
  #    GitHub 브랜치 보호 규칙(required status check)과 함께 사용해야
  #    UI에서도 머지가 불가능해짐
  # ----------------------------------------------------------
  check-source-branch:
    name: Check Source Branch
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR source is development
        run: |
          if [[ "${{ github.head_ref }}" != "development" ]]; then
            echo "::error::main으로의 PR은 development 브랜치에서만 허용됩니다."
            echo "::error::현재 소스 브랜치: ${{ github.head_ref }}"
            exit 1
          fi

  # ----------------------------------------------------------
  # 1. 린트 & 테스트
  #    pyproject.toml 기반 프로젝트이므로 pip install -e 로 설치
  #    ruff/pytest는 pyproject.toml [dev] extras에 포함된 것으로 가정
  # ----------------------------------------------------------
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    needs: check-source-branch
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

  # ----------------------------------------------------------
  # 2. Docker 빌드 검증 (push 없이 빌드만)
  #    CI 단계에서는 빌드 가능 여부만 확인
  #    실제 ECR 푸시는 deploy.yml에서 merge 전에 수행
  # ----------------------------------------------------------
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: check-source-branch
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (no push)
        run: docker build -t hsa-check:ci .

  # ----------------------------------------------------------
  # 3. CI 통과 시 deploy.yml 호출
  #    lint-and-test + docker-build-check 둘 다 통과해야 실행
  #    deploy.yml에서 ECR 푸시 → squash merge → ECS 배포 순으로 처리
  #
  #    head_sha: PR 브랜치의 커밋 SHA
  #    → merge 전 빌드이므로 이 SHA를 ECR 이미지 태그로 사용
  #    → merge 후 생성되는 squash 커밋 SHA와 구분됨
  # ----------------------------------------------------------
  call-deploy:
    name: Call Deploy
    needs: [lint-and-test, docker-build-check]
    uses: ./.github/workflows/deploy.yml
    with:
      # [수정] pr_number를 string으로 전달 (deploy.yml input 타입 변경에 대응)
      pr_number: ${{ github.event.pull_request.number }}
      head_sha: ${{ github.event.pull_request.head.sha }}
    secrets: inherit  # AWS_OIDC_ROLE_ARN 등 secrets 전달
