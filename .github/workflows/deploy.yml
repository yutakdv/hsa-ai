name: Deploy

# ci.yml에서 workflow_call로 호출됨
# CI(lint/test/docker build)가 통과된 코드만 여기까지 오는 구조
#
# [개선된 배포 순서]
# 기존: squash merge → checkout main → ECR push → ECS deploy
# 개선: checkout PR → OIDC → ECR push → squash merge → ECS deploy
#
# merge 이전에 ECR push까지 완료함으로써
# merge 이후 실패 지점을 ECS deploy 단계 하나로 축소
#
# [이미지 태그 전략]
# merge 전 PR 브랜치의 head_sha(앞 12자)를 이미지 태그로 사용
# squash merge 후 생성되는 커밋 SHA와는 다른 값이지만
# PR 단위 추적성이 보장되고 ECR 태그 ↔ PR 커밋 1:1 대응됨
#
# [merge 이후 실패 시 동작]
# ECS deploy 실패 → Circuit Breaker가 이전 task revision으로 자동 롤백
# 서비스는 정상이지만 main 코드와 ECR 이미지는 새 버전인 불일치 상태
# 복구: development에서 빈 커밋 push → PR 재생성 → 파이프라인 재실행

on:
  workflow_call:
    inputs:
      # [수정] number → string 으로 변경
      # gh pr merge 에서 문자열로 사용되므로 타입을 일치시켜 암묵적 변환 제거
      pr_number:
        required: true
        type: string
      head_sha:
        required: true
        type: string
        # PR 브랜치의 커밋 SHA (merge 전)
        # ECR 이미지 태그로 사용 → merge 후 squash SHA와 구분

# 동시에 여러 배포가 겹치지 않도록 직렬화
# 진행 중인 배포는 취소하지 않고 완료 후 다음 배포 실행
concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hsa-ai
  ECS_CLUSTER: hsa-cluster
  ECS_SERVICE: hsa-ai
  CONTAINER_NAME: hsa-ai

jobs:
  deploy:
    name: Push & Merge & Deploy
    runs-on: ubuntu-latest

    permissions:
      id-token: write      # OIDC로 AWS 임시 자격증명을 받기 위해 필요
      contents: write      # squash merge를 위해 필요
      pull-requests: write # gh pr merge를 위해 필요

    steps:
      # ----------------------------------------------------------
      # 1. PR 브랜치 체크아웃 (merge 전)
      #    head_sha 기준으로 정확히 CI가 검증한 커밋을 빌드
      #    merge 후 main을 checkout하면 squash 커밋이 달라 추적이 어려움
      # ----------------------------------------------------------
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha }}

      # ----------------------------------------------------------
      # 2. OIDC로 AWS 임시 자격증명 발급
      #    장기 액세스 키 없이 워크플로 실행 시간 동안만 유효한 토큰 사용
      #    사전 조건: IAM Role에 GitHub OIDC Provider trust policy 설정 필요
      # ----------------------------------------------------------
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ----------------------------------------------------------
      # 3. ECR 로그인
      # ----------------------------------------------------------
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ----------------------------------------------------------
      # 4. QEMU 설정
      #    amd64 runner에서 arm64 이미지를 빌드하기 위해 필요
      #    없으면 Dockerfile RUN 명령어에서 exec /bin/sh: exec format error 발생
      # ----------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      # ----------------------------------------------------------
      # 4-1. Docker Buildx 설정
      #      멀티 플랫폼 빌드를 위해 Buildx 드라이버 활성화
      #      docker build 대신 docker buildx build 사용
      # ----------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----------------------------------------------------------
      # 5. Docker 빌드 & ECR 푸시 (merge 전)
      #    이미지 태그: head_sha 앞 12자 (PR 브랜치 커밋 기준)
      #    이 단계까지 실패해도 main은 아직 이전 커밋 상태 → 코드/배포 일치
      #
      #    docker buildx build --push: 빌드와 푸시를 한 번에 처리
      #    기존 docker build + docker push 두 단계를 통합
      # ----------------------------------------------------------
      - name: Build & Push to ECR
        id: build
        run: |
          SHORT_SHA="${head_sha:0:12}"
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}"
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -t "$IMAGE_URI" \
            .
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
        env:
          head_sha: ${{ inputs.head_sha }}

      # ----------------------------------------------------------
      # 6. squash merge
      #    ECR push 성공 이후 merge → 이 시점부터 main에 새 코드가 들어옴
      #    이후 실패 지점은 ECS deploy 하나뿐
      #    ECS deploy 실패 시 Circuit Breaker가 자동 롤백
      # ----------------------------------------------------------
      - name: Merge PR
        run: |
          gh pr merge "${{ inputs.pr_number }}" \
            --squash \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------
      # 7. 현재 운영 중인 Task Definition 가져오기
      #    등록된 최신 revision을 기준으로 이미지만 교체
      # ----------------------------------------------------------
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ env.CONTAINER_NAME }}" \
            --query taskDefinition \
            > task-definition.json

      # ----------------------------------------------------------
      # 8. Task Definition에 새 이미지 URI 반영
      # ----------------------------------------------------------
      - name: Render new task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image_uri }}

      # ----------------------------------------------------------
      # 9. ECS 서비스 업데이트 (롤링 배포)
      #    - 새 Task가 헬스체크 통과 전까지 기존 Task 유지 → 무중단 배포
      #    - 헬스체크 실패 시 ECS Circuit Breaker가 자동으로 이전 revision 롤백
      #    - wait-for-service-stability: true → 배포 완료까지 워크플로 대기
      #      배포 실패 시 워크플로도 실패로 표시되어 슬랙/이메일 알림 연동 가능
      #
      #    실패 시 상태: main 코드 = 새 버전, ECS = 이전 버전 (Circuit Breaker 롤백)
      #    복구: development에서 빈 커밋 push → 파이프라인 재실행
      # ----------------------------------------------------------
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true